<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareMed Easy - ระบบผู้ดูแลอัจฉริยะ</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700;800&display=swap');
        body {
            font-family: 'Sarabun', sans-serif;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            // --- CONFIG / API CONNECTION ---
            const defaultUrl = "https://script.google.com/macros/s/AKfycbxHPP5ip4kp1R6KE3xOMwU7ZelW2Yhlp5VXsMTLbrdSCMNdcX3bmRHHLBq5tiP3irrQ/exec";
            
            const [scriptUrl, setScriptUrl] = useState(() => {
                return localStorage.getItem('caremed_script_url') || defaultUrl;
            });
            const [connectionStatus, setConnectionStatus] = useState('disconnected'); 
            const [connectionError, setConnectionError] = useState("");

            // --- STATE ---
            const [currentUser, setCurrentUser] = useState(() => {
                const saved = localStorage.getItem('caremed_user');
                return saved ? JSON.parse(saved) : null;
            });
            const [loginForm, setLoginForm] = useState({ email: "", password: "" });
            const [authLoading, setAuthLoading] = useState(false);
            const [authError, setAuthError] = useState("");

            const [assignedPatients, setAssignedPatients] = useState([]);
            const [selectedPatientId, setSelectedPatientId] = useState("");

            const [patient, setPatient] = useState({
                id: "PAT-OFFLINE",
                name: "นายบี ใจเย็น",
                nickname: "บี",
                ageGenderDob: "20 ปี / ชาย",
                nationalId: "1-1002-34567-89-0",
                medicalConditions: "เบาหวาน, มีภาวะวูบบ่อย",
                bloodGroup: "O",
                allergies: "แพ้ยา Penicillin",
                precautions: "เสี่ยงต่อการล้มบ่อย, ห้ามปล่อยให้อยู่ลำพัง",
                contactRelative: "นางใจดี ใจเย็น (มารดา) โทร: 089-111-2222",
                address: "123/4 หมู่ 5 ถ.สุขุมวิท กรุงเทพฯ",
                hospitalInfo: "รพ.จุฬาลงกรณ์ (นพ.สมชาย / แผนกอายุรกรรม)",
                insuranceType: "บัตรทอง (รพ.จุฬาลงกรณ์)"
            });
            
            const [isEditingPatient, setIsEditingPatient] = useState(false);
            const [editedPatient, setEditedPatient] = useState({ ...patient });

            const [medicines, setMedicines] = useState([
                {
                    id: "med-1",
                    name: "Metformin (เมทฟอร์มิน)",
                    disease: "โรคเบาหวาน",
                    dosage: "500 มิลลิกรัม",
                    timeSlots: ["เช้า", "เย็น"],
                    instructions: "หลังอาหารทันที",
                    barcode: "8851234567890",
                    pillColor: "bg-white text-slate-800 border-slate-300",
                    pillShape: "rounded-full w-8 h-8",
                    notes: "ทานพร้อมอาหารเพื่อลดอาการคลื่นไส้"
                }
            ]);

            const [activeTab, setActiveTab] = useState('dashboard');
            const [selectedDisease, setSelectedDisease] = useState(null);
            const [takenTracker, setTakenTracker] = useState({});

            const [medForm, setMedForm] = useState({
                id: "",
                name: "",
                disease: "โรคเบาหวาน",
                dosage: "",
                timeSlots: [],
                instructions: "",
                barcode: "",
                pillColor: "bg-white text-slate-800 border-slate-300",
                pillShape: "rounded-full w-8 h-8",
                notes: ""
            });
            const [isEditingMed, setIsEditingMed] = useState(false);
            const [notification, setNotification] = useState("");
            const [searchTerm, setSearchTerm] = useState("");

            const [dataLoading, setDataLoading] = useState(false);
            const [isSyncing, setIsSyncing] = useState(false);

            const availableDiseases = ["โรคเบาหวาน", "โรคความดันโลหิตสูง", "โรคไขมันในเลือดสูง", "โรคภูมิแพ้", "โรคหัวใจ", "บำรุงประสาท", "อื่นๆ"];

            const colorsPreset = [
                { name: "ขาว", value: "bg-white text-slate-800 border-slate-300" },
                { name: "ชมพู", value: "bg-pink-100 text-pink-700 border-pink-300" },
                { name: "ฟ้า", value: "bg-sky-100 text-sky-700 border-sky-300" },
                { name: "เหลือง", value: "bg-amber-50 text-amber-700 border-amber-300" },
                { name: "เขียว", value: "bg-emerald-100 text-emerald-700 border-emerald-300" },
                { name: "ส้ม", value: "bg-orange-100 text-orange-700 border-orange-300" }
            ];

            const shapesPreset = [
                { name: "กลมเล็ก", value: "rounded-full w-8 h-8" },
                { name: "กลมใหญ่", value: "rounded-full w-12 h-12" },
                { name: "วงรีแนวนอน", value: "rounded-full w-12 h-6" },
                { name: "แคปซูล", value: "rounded-2xl w-14 h-6 border-2" },
                { name: "สี่เหลี่ยมมน", value: "rounded-lg w-8 h-8" }
            ];

            // --- GOOGLE SHEETS CONNECTION & DATA SYNC ---
            const testConnection = async (urlToTest = scriptUrl) => {
                if (!urlToTest) {
                    setConnectionStatus('disconnected');
                    return false;
                }
                setConnectionStatus('testing');
                setConnectionError("");
                try {
                    const response = await fetch(`${urlToTest}?action=test`);
                    const data = await response.json();
                    if (data.status === "success") {
                        setConnectionStatus('connected');
                        localStorage.setItem('caremed_script_url', urlToTest);
                        return true;
                    } else {
                        throw new Error(data.message || "การทดสอบล้มเหลว");
                    }
                } catch (err) {
                    setConnectionStatus('error');
                    setConnectionError("ไม่สามารถเชื่อมต่อกับชีตได้");
                    return false;
                }
            };

            const fetchPatientData = async (caregiverId, patientId) => {
                if (!scriptUrl || !caregiverId || !patientId) return;
                setDataLoading(true);
                try {
                    const response = await fetch(`${scriptUrl}?action=getData&caregiverId=${encodeURIComponent(caregiverId)}&patientId=${encodeURIComponent(patientId)}`);
                    const data = await response.json();
                    if (data.status === "success") {
                        setPatient(data.patient);
                        setEditedPatient(data.patient);
                        setMedicines(data.medicines);
                        setTakenTracker(data.tracker || {});
                        if (data.myPatients) {
                            setAssignedPatients(data.myPatients);
                        }
                        triggerNotification(`ดึงข้อมูลคุณ ${data.patient.name} สำเร็จ!`);
                    } else {
                        triggerNotification(`ข้อผิดพลาด: ${data.message}`);
                    }
                } catch (err) {
                    triggerNotification("ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์เพื่อซิงก์ข้อมูลได้");
                } final {
                    setDataLoading(false);
                }
            };

            useEffect(() => {
                if (scriptUrl) {
                    testConnection(scriptUrl).then(connected => {
                        if (connected && currentUser) {
                            const targetId = selectedPatientId || currentUser.assignedPatientIds[0];
                            if (targetId) {
                                setSelectedPatientId(targetId);
                                fetchPatientData(currentUser.id, targetId);
                            }
                        }
                    });
                }
            }, [scriptUrl, selectedPatientId]);

            const triggerNotification = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(""), 3500);
            };

            // --- ACTIONS ---
            const handleLogin = async (e) => {
                e.preventDefault();
                if (!loginForm.email || !loginForm.password) {
                    setAuthError("กรุณากรอกอีเมลและรหัสผ่านให้ครบถ้วน");
                    return;
                }
                setAuthLoading(true);
                setAuthError("");

                if (!scriptUrl || loginForm.email === "demo@email.com") {
                    if (loginForm.email === "demo@email.com" && loginForm.password === "passA123") {
                        const mockOfflineUser = {
                            id: "CG-01",
                            name: "นายเอ รักดี",
                            email: "a@email.com",
                            phone: "081-234-5678",
                            assignedPatientIds: ["P-01", "P-02"]
                        };
                        setCurrentUser(mockOfflineUser);
                        setAssignedPatients([
                            { id: "P-01", name: "นายบี ใจเย็น" },
                            { id: "P-02", name: "นางสาวซี สดใส" }
                        ]);
                        setSelectedPatientId("P-01");
                        localStorage.setItem('caremed_user', JSON.stringify(mockOfflineUser));
                        triggerNotification("ลงชื่อเข้าใช้สำเร็จ (จำลองแบบ Offline)");
                        setAuthLoading(false);
                        return;
                    } else {
                        setAuthError("อีเมลหรือรหัสผ่านจำลองไม่ถูกต้อง");
                        setAuthLoading(false);
                        return;
                    }
                }

                try {
                    const url = `${scriptUrl}?action=login&email=${encodeURIComponent(loginForm.email)}&password=${encodeURIComponent(loginForm.password)}`;
                    const response = await fetch(url);
                    const data = await response.json();
                    if (data.status === "success") {
                        setCurrentUser(data.caregiver);
                        localStorage.setItem('caremed_user', JSON.stringify(data.caregiver));
                        triggerNotification(`เข้าสู่ระบบในฐานะ: ${data.caregiver.name}`);
                        if (data.caregiver.assignedPatientIds && data.caregiver.assignedPatientIds.length > 0) {
                            const firstPatientId = data.caregiver.assignedPatientIds[0];
                            setSelectedPatientId(firstPatientId);
                            await fetchPatientData(data.caregiver.id, firstPatientId);
                        }
                    } else {
                        setAuthError(data.message || "ไม่สามารถล็อกอินได้");
                    }
                } catch (err) {
                    setAuthError("เกิดข้อผิดพลาดในการตรวจสอบสิทธิ์");
                } finally {
                    setAuthLoading(false);
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                setAssignedPatients([]);
                setSelectedPatientId("");
                localStorage.removeItem('caremed_user');
                triggerNotification("ออกจากระบบเรียบร้อย");
            };

            const handleSavePatient = async (e) => {
                e.preventDefault();
                setPatient({ ...editedPatient });
                setIsEditingPatient(false);
                triggerNotification("อัปเดตข้อมูลผู้ป่วยเรียบร้อย");
            };

            const handleMedSubmit = async (e) => {
                e.preventDefault();
                if (!medForm.name.trim()) {
                    triggerNotification("กรุณาระบุชื่อยาด้วยครับ");
                    return;
                }
                const payload = { ...medForm };
                if (isEditingMed) {
                    setMedicines(medicines.map(m => m.id === medForm.id ? { ...payload } : m));
                    triggerNotification("แก้ไขข้อมูลยาเรียบร้อย");
                } else {
                    setMedicines([...medicines, { ...payload, id: "med-" + Date.now() }]);
                    triggerNotification("เพิ่มยาใหม่เรียบร้อย");
                }
                resetMedForm();
                setActiveTab('dashboard');
            };

            const handleEditMedStart = (med) => {
                setMedForm({ ...med, originalName: med.name });
                setIsEditingMed(true);
                setActiveTab('manage');
            };

            const handleDeleteMed = (medName) => {
                if (window.confirm(`คุณต้องการลบยา "${medName}" ใช่หรือไม่?`)) {
                    setMedicines(medicines.filter(m => m.name !== medName));
                    triggerNotification(`ลบรายการยา "${medName}" แล้ว`);
                }
            };

            const togglePillTaken = (timeSlot, med) => {
                const today = new Date().toDateString();
                const key = `${today}-${timeSlot}-${med.name}`;
                const nextVal = !takenTracker[key];
                setTakenTracker(prev => ({ ...prev, [key]: nextVal }));
                triggerNotification(nextVal ? "เช็กการให้ยาเสร็จสิ้น" : "ยกเลิกการให้ยา");
            };

            const handleTimeSlotToggle = (slot) => {
                const current = [...medForm.timeSlots];
                if (current.includes(slot)) {
                    setMedForm({ ...medForm, timeSlots: current.filter(s => s !== slot) });
                } else {
                    setMedForm({ ...medForm, timeSlots: [...current, slot] });
                }
            };

            const resetMedForm = () => {
                setMedForm({
                    id: "", name: "", disease: "โรคเบาหวาน", dosage: "",
                    timeSlots: [], instructions: "", barcode: "",
                    pillColor: "bg-white text-slate-800 border-slate-300",
                    pillShape: "rounded-full w-8 h-8", notes: ""
                });
                setIsEditingMed(false);
            };

            const simulateBarcodeScan = () => {
                setMedForm(prev => ({
                    ...prev,
                    barcode: "885" + Math.floor(Math.random() * 1000000000),
                    name: "Amlodipine (แอมโลดิพีน)",
                    dosage: "5 มิลลิกรัม",
                    instructions: "หลังอาหารเช้า",
                    disease: "โรคความดันโลหิตสูง",
                    notes: "คุมระดับความดันโลหิต"
                }));
                triggerNotification("จำลองสแกนบาร์โค้ดสำเร็จ!");
            };

            // หลังเรนเดอร์ ให้ Lucide Icons ทำงานใหม่สม่ำเสมอเพื่ออัปเดตไอคอนบนหน้าจอ
            useEffect(() => {
                if(window.lucide) {
                    window.lucide.createIcons();
                }
            }, [currentUser, activeTab, isEditingPatient, medicines, notification]);

            // --- RENDER LOGIN VIEW ---
            if (!currentUser) {
                return (
                    <div class="min-h-screen bg-slate-950 text-slate-100 flex flex-col justify-between">
                        <header class="bg-gradient-to-r from-rose-600 via-pink-600 to-rose-700 shadow-xl text-white py-4 px-6 text-center">
                            <div class="max-w-4xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-2">
                                <div class="flex items-center space-x-3 justify-center w-full sm:w-auto">
                                    <h1 class="text-xl font-black tracking-wide">CareMed Easy Security Login</h1>
                                </div>
                            </div>
                        </header>

                        <main class="max-w-md w-full mx-auto p-4 flex-1 flex flex-col justify-center">
                            <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
                                <div class="text-center mb-6">
                                    <h2 class="text-2xl font-black text-white">ลงชื่อเข้าใช้งานผู้ดูแล</h2>
                                    <p class="text-xs text-slate-400 mt-1">กรอกบัญชีผู้ดูแลเพื่อตรวจดูข้อมูลคนไข้</p>
                                </div>

                                {authError && (
                                    <div class="bg-red-950/40 border border-red-500/40 text-red-300 text-xs p-3 rounded-xl mb-5 text-center">
                                        {authError}
                                    </div>
                                )}

                                <form onSubmit={handleLogin} class="space-y-4">
                                    <div>
                                        <label class="block text-xs font-bold text-slate-400 mb-1">อีเมลผู้ดูแล</label>
                                        <input type="email" value={loginForm.email} onChange={(e) => setLoginForm({ ...loginForm, email: e.target.value })} placeholder="เช่น demo@email.com" class="w-full text-sm p-3 rounded-xl bg-slate-950 border border-slate-800 focus:outline-none focus:ring-2 focus:ring-pink-500 text-slate-100" required />
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-slate-400 mb-1">รหัสผ่าน</label>
                                        <input type="password" value={loginForm.password} onChange={(e) => setLoginForm({ ...loginForm, password: e.target.value })} placeholder="ป้อนรหัสผ่าน" class="w-full text-sm p-3 rounded-xl bg-slate-950 border border-slate-800 focus:outline-none focus:ring-2 focus:ring-pink-500 text-slate-100" required />
                                    </div>
                                    <button type="submit" disabled={authLoading} class="w-full bg-gradient-to-r from-pink-600 to-rose-600 hover:from-pink-700 hover:to-rose-700 text-white font-extrabold py-3 rounded-xl shadow-lg transition transform active:scale-95 disabled:opacity-50">
                                        {authLoading ? "กำลังเชื่อมต่อ..." : "ตรวจสอบสิทธิ์และเข้าสู่ระบบ"}
                                    </button>
                                </form>

                                <div class="mt-6 pt-5 border-t border-slate-800 text-center text-xs">
                                    <button type="button" onClick={() => { setLoginForm({ email: "demo@email.com", password: "passA123" }); triggerNotification("ใส่ข้อมูลสิทธิ์ Demo เรียบร้อย"); }} class="text-pink-400 hover:underline font-semibold">
                                        คลิกเพื่อทดสอบด้วยสิทธิ์ของ 'นายเอ รักดี' (แบบ Offline: passA123)
                                    </button>
                                </div>
                            </div>
                        </main>
                        <footer class="text-center py-4 text-xs text-slate-600">CareMed Easy © 2026</footer>
                    </div>
                );
            }

            // --- RENDER MAIN INTERFACE ---
            return (
                <div class="pb-16 text-slate-200">
                    {notification && (
                        <div class="fixed top-4 left-1/2 transform -translate-x-1/2 z-50 bg-rose-600 text-white px-6 py-3 rounded-full shadow-2xl font-bold text-sm">
                            🎉 {notification}
                        </div>
                    )}

                    <header class="bg-gradient-to-r from-rose-600 via-pink-600 to-rose-700 shadow-xl text-white sticky top-0 z-40">
                        <div class="max-w-6xl mx-auto px-4 py-3 flex flex-col md:flex-row justify-between items-center gap-2">
                            <div>
                                <h1 class="text-xl font-extrabold">CareMed Easy</h1>
                                <p class="text-xs text-rose-100">ระบบจัดการยารายวันสำหรับผู้ดูแลผู้ป่วย</p>
                            </div>
                            <div class="flex items-center gap-3 text-xs">
                                <div class="bg-rose-950/40 px-3 py-1.5 rounded-xl border border-rose-500/30">
                                    <span class="font-bold block text-white">{currentUser.name}</span>
                                    <span class="text-[10px] text-pink-200">ID ผู้ดูแล: {currentUser.id}</span>
                                </div>
                                <button onClick={handleLogout} class="bg-slate-900 hover:bg-red-950 px-3 py-2 rounded-xl text-pink-300 font-bold border border-slate-800 transition">
                                    ออกจากระบบ
                                </button>
                            </div>
                        </div>
                    </header>

                    <main class="max-w-6xl mx-auto p-4 grid grid-cols-1 lg:grid-cols-12 gap-6">
                        {/* คอลัมน์ซ้าย ข้อมูลคนไข้และปุ่มนำทาง */}
                        <div class="lg:col-span-4 space-y-6">
                            <div class="bg-pink-100 rounded-3xl p-6 shadow-xl border-4 border-pink-200 text-slate-800 relative">
                                <div class="flex justify-between items-center mb-4">
                                    <span class="bg-pink-300 text-pink-900 text-[10px] font-black px-3 py-1 rounded-full">📋 ผู้ป่วยที่อยู่ในการดูแล</span>
                                    <button onClick={() => { setIsEditingPatient(!isEditingPatient); setEditedPatient({...patient}); }} class="text-xs text-pink-700 font-bold underline">
                                        {isEditingPatient ? "ปิด" : "แก้ไข"}
                                    </button>
                                </div>

                                {!isEditingPatient ? (
                                    <div class="space-y-3 text-xs">
                                        <div class="flex items-center space-x-3">
                                            <div class="w-12 h-12 bg-pink-300 rounded-full flex items-center justify-center text-pink-900 font-black text-lg">
                                                {patient.nickname}
                                            </div>
                                            <div>
                                                <h3 class="text-lg font-bold text-slate-900 leading-tight">{patient.name}</h3>
                                                <p class="text-[11px] text-slate-600">โรคประจำตัว: {patient.medicalConditions}</p>
                                            </div>
                                        </div>
                                        <div class="border-t border-pink-200 pt-2 space-y-1 text-slate-700">
                                            <p><strong>เพศ/อายุ:</strong> {patient.ageGenderDob}</p>
                                            <p class="text-red-700 font-bold"><strong>🚨 แพ้ยา:</strong> {patient.allergies}</p>
                                            <p class="text-amber-700"><strong>⚠️ ข้อควรระวัง:</strong> {patient.precautions}</p>
                                            <p><strong>ติดต่อญาติ:</strong> {patient.contactRelative}</p>
                                        </div>
                                    </div>
                                ) : (
                                    <form onSubmit={handleSavePatient} class="space-y-2 text-xs">
                                        <input type="text" value={editedPatient.name} onChange={(e) => setEditedPatient({...editedPatient, name: e.target.value})} class="w-full p-2 bg-white rounded border border-pink-300" placeholder="ชื่อผู้ป่วย" required />
                                        <input type="text" value={editedPatient.nickname} onChange={(e) => setEditedPatient({...editedPatient, nickname: e.target.value})} class="w-full p-2 bg-white rounded border border-pink-300" placeholder="ชื่อเล่น" />
                                        <input type="text" value={editedPatient.medicalConditions} onChange={(e) => setEditedPatient({...editedPatient, medicalConditions: e.target.value})} class="w-full p-2 bg-white rounded border border-pink-300" placeholder="โรคประจำตัว" />
                                        <input type="text" value={editedPatient.allergies} onChange={(e) => setEditedPatient({...editedPatient, allergies: e.target.value})} class="w-
